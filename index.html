<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            text-align: center;
            background: linear-gradient(to right, #89f7fe, #66a6ff);
            transition: background 0.5s ease;
            color: #333;
        }
        .container {
            padding: 40px;
        }
        .name {
            font-size: 50px;
            font-weight: bold;
            color: white;
            margin-top: 40px;
        }
        #welcome {
            color: white;
            font-size: 22px;
        }
        .menu {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .box {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            width: 180px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .box:hover {
            transform: translateY(-8px);
        }
        h2 {
            color: #2c3e50;
        }
        .content {
            display: none;
            margin-top: 10px;
            color: #555;
            font-size: 15px;
        }
        button {
            margin-top: 40px;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: #2c7be5;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.08);
        }
        #datetime {
            margin-top: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="welcome"></h2>
        <div class="name">I'm Karishma!</div>
        <div class="menu">
            <div class="box">
                <h2>Intro</h2>
                <div class="content">
                    Hello! I am a Computer Science student passionate about technology and programming.
                </div>
            </div>
            <div class="box">
                <h2>Hobbies</h2>
                <div class="content">
                    Reading, Gaming,Doodling
                </div>
            </div>
            <div class="box">
                <h2>Skills</h2>
                <div class="content">
                    Python, C, C++, Problem Solving
                </div>
            </div>
            <div class="box">
                <h2>Goals</h2>
                <div class="content">
                    Become a Data Analyst
                </div>
            </div>
        </div>
        <button onclick="toggleContent()">
            Hide / Show Content
        </button>
        <button onclick="changeColor()">
            Change Background
        </button>
        <div id="datetime"></div>
    </div>
    <script>
        document.getElementById("welcome").innerHTML =
            " Welcome to My Personal Webpage ";
        function updateTime() {
            let now = new Date();
            document.getElementById("datetime").innerHTML =
                now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
        function toggleContent() {
            let contents =
                document.querySelectorAll(".content");
            contents.forEach(content => {
                if (content.style.display === "block") {
                    content.style.display = "none";
                } else {
                    content.style.display = "block";
                }
            });
        }
        function changeColor() {
            const gradients = [
                "linear-gradient(to right, #89f7fe, #66a6ff)",
                "linear-gradient(to right, #ff9a9e, #fad0c4)",
                "linear-gradient(to right, #a18cd1, #fbc2eb)",
                "linear-gradient(to right, #84fab0, #8fd3f4)",
                "linear-gradient(to right, #fccb90, #d57eeb)"
            ];
            let randomGradient =
                gradients[Math.floor(Math.random() * gradients.length)];
            document.body.style.background = randomGradient;
        }
    </script>
</body>
</html>
