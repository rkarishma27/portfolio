<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:'Poppins', sans-serif;
            background:linear-gradient(to right,#89f7fe,#66a6ff);
            transition:0.4s;
        }
        /* Navigation */
        nav{
            background:#1e3a5f;
            color:white;
            display:flex;
            justify-content:space-between;
            padding:20px 50px;
            position:sticky;
            top:0;
        }
        nav ul{
            display:flex;
            list-style:none;
            gap:25px;
        }
        nav ul li a{
            color:white;
            text-decoration:none;
            transition:0.3s;
        }
        nav ul li a:hover{
            color:#ffd700;
        }
        /* Hero Section */
        .hero{
            text-align:center;
            padding:60px 20px;
            color:white;
        }
        .hero h1{
            font-size:50px;
        }
        .container{
            width:85%;
            margin:auto;
        }
        section{
            background:white;
            margin:25px 0;
            padding:30px;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            transition:0.3s;
        }
        section:hover{
            transform:translateY(-5px);
        }

        h2{
            margin-bottom:15px;
            color:#1e3a5f;
        }
        button{
            padding:10px 18px;
            border:none;
            border-radius:20px;
            background:#1e88e5;
            color:white;
            cursor:pointer;
            margin:5px;
            transition:0.3s;
        }
        button:hover{
            transform:scale(1.08);
        }
        .dark-mode{
            background:#121212;
            color:white;
        }
        .dark-mode section{
            background:#1f1f1f;
            color:white;
        }
        .counter{
            font-size:25px;
            margin:15px 0;
        }
        #aboutContent{
            display:none;
        }
        footer{
            text-align:center;
            padding:20px;
            color:white;
        }
    </style>
</head>
<body>
    <nav>
        <h2>portfolio</h2>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#tools">Tools</a></li>
            <li><a href="#quote">Quotes</a></li>
        </ul>
    </nav>
    <div class="hero" id="home">
        <h1> Welcome! </h1>
        <p id="dateTime"></p>
    </div>
    <div class="container">
        <section id="about">
            <h2>About Me</h2>
            <button onclick="toggleAbout()">
                Show / Hide
            </button>
            <p id="aboutContent">
                Hello! I am Karishma,a  Computer Science student passionate
                about AI, programming, and web development.
            </p>
        </section>
        <section id="tools">
            <h2>Dashboard Tools</h2>
            <button onclick="changeBackground()">
                Change Background
            </button>
            <button onclick="toggleMode()">
                Dark / Light Mode
            </button>
        </section>
        <section>
            <h2>Counter</h2>
            <div class="counter" id="count">
                0
            </div>
            <button onclick="increase()">+</button>
            <button onclick="decrease()">-</button>
        </section>
        <section id="quote">
            <h2>Motivational Quote</h2>
            <p id="quoteText">
                Click button for a quote!
            </p>
            <button onclick="generateQuote()">
                New Quote
            </button>
        </section>
    </div>
    <footer>
        Portfolio © 2026
    </footer>
<script>
    // Date & Time
    function updateTime(){
        let now = new Date();
        document.getElementById("dateTime")
        .innerHTML = now.toLocaleString();
    }
    setInterval(updateTime,1000);
    updateTime();
    // Show/Hide About
    function toggleAbout(){

        let content =
        document.getElementById("aboutContent");

        if(content.style.display==="block"){
            content.style.display="none";
        }
        else{
            content.style.display="block";
        }
    }
    // Background changer
    function changeBackground(){
        let colors=[
            "linear-gradient(to right,#89f7fe,#66a6ff)",
            "linear-gradient(to right,#ff9a9e,#fad0c4)",
            "linear-gradient(to right,#84fab0,#8fd3f4)",
            "linear-gradient(to right,#a18cd1,#fbc2eb)"
        ];
        let random=
        colors[Math.floor(Math.random()*colors.length)];
        document.body.style.background=random;
    }
    // Dark mode
    function toggleMode(){
        document.body.classList.toggle("dark-mode");
    }
    // Counter
    let count=0;
    function increase(){
        count++;
        document.getElementById("count").innerHTML=count;
    }
    function decrease(){
        count--;
        document.getElementById("count").innerHTML=count;
    }
    // Quote generator
    function generateQuote(){
        let quotes=[
            "Success comes from consistency.",
            "Dream big and work hard.",
            "Code, learn, improve, repeat.",
            "Every expert was once a beginner."
        ];
        let randomQuote=
        quotes[Math.floor(Math.random()*quotes.length)];
        document.getElementById("quoteText")
        .innerHTML=randomQuote;
    }
</script>
</body>
</html>
